name: Deploy demo to GitHub Pages

on:
  push:
    branches: [master, main, demo-mode]
  workflow_dispatch:

# Pages deployments need these permissions for the official actions to work.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment in flight at a time; cancel earlier in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload public/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
